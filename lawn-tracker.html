<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mow Schedule</title>
<style>
  :root {
    --bg: #0f1410;
    --panel: #161d17;
    --line: #2a342b;
    --green: #5fae6b;
    --green-dim: #3b5c41;
    --amber: #d9a440;
    --red: #c1564a;
    --text: #e7ece6;
    --text-dim: #8aa089;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--green);
    padding-bottom: 10px;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 16px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 4px solid var(--green-dim);
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .card.due { border-left-color: var(--red); }
  .card.soon { border-left-color: var(--amber); }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .name {
    font-size: 1.05rem;
    font-weight: bold;
    letter-spacing: 0.02em;
  }
  .price {
    color: var(--green);
    font-weight: bold;
    white-space: nowrap;
  }
  .meta {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-top: 4px;
  }
  .status {
    margin-top: 8px;
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.04em;
  }
  .status.due { color: var(--red); }
  .status.soon { color: var(--amber); }
  .status.ok { color: var(--green); }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-size: 0.8rem;
    background: var(--green-dim);
    color: var(--text);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
  }
  button:active { transform: scale(0.97); }
  button.secondary {
    background: transparent;
    border-color: var(--line);
    color: var(--text-dim);
  }
  .cycle-input {
    width: 50px;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: inherit;
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 0.8rem;
  }
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filter-bar button {
    background: transparent;
    border-color: var(--line);
    color: var(--text-dim);
  }
  .filter-bar button.active {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--text);
  }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 30px 10px;
    font-size: 0.85rem;
  }
  .loading { text-align: center; color: var(--text-dim); padding: 30px; }
  .history-section {
    margin-top: 10px;
    border-top: 1px solid var(--line);
    padding-top: 8px;
  }
  .history-list {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-height: 160px;
    overflow-y: auto;
  }
  .history-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.78rem;
    padding: 2px 0;
  }
  .history-entry .h-date { color: var(--text); }
  .history-entry .h-ago { color: var(--text-dim); font-size: 0.72rem; }
  .history-badge {
    display: inline-block;
    background: var(--green-dim);
    color: var(--green);
    border-radius: 3px;
    font-size: 0.72rem;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .btn-history {
    background: transparent;
    border-color: var(--line);
    color: var(--text-dim);
    font-size: 0.75rem;
    padding: 4px 8px;
  }
</style>
</head>
<body>

<h1>Mow Schedule</h1>
<div class="subtitle" id="subtitle">loading...</div>

<div class="filter-bar">
  <button id="filter-all" class="active">All</button>
  <button id="filter-due">Due / Overdue</button>
  <button id="filter-soon">Coming up</button>
</div>

<button id="add-lawn-btn" style="width:100%; margin-bottom:14px; padding:10px;">+ Add Lawn</button>

<div id="add-form" style="display:none; background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:14px; margin-bottom:14px;">
  <input type="text" id="new-name" placeholder="Name / Address" style="width:100%; margin-bottom:8px; background:var(--bg); border:1px solid var(--line); color:var(--text); font-family:inherit; padding:8px; border-radius:4px;">
  <div style="display:flex; gap:8px; margin-bottom:8px;">
    <input type="number" id="new-price" placeholder="Price $" style="flex:1; background:var(--bg); border:1px solid var(--line); color:var(--text); font-family:inherit; padding:8px; border-radius:4px;">
    <input type="number" id="new-cycle" placeholder="Cycle (days)" value="8" style="flex:1; background:var(--bg); border:1px solid var(--line); color:var(--text); font-family:inherit; padding:8px; border-radius:4px;">
  </div>
  <input type="date" id="new-lastmow" style="width:100%; margin-bottom:10px; background:var(--bg); border:1px solid var(--line); color:var(--text); font-family:inherit; padding:8px; border-radius:4px;">
  <div style="display:flex; gap:8px;">
    <button id="save-new-lawn">Save</button>
    <button class="secondary" id="cancel-new-lawn">Cancel</button>
  </div>
</div>

<div id="list" class="loading">Loading lawns...</div>

<script>
const STORAGE_KEY = 'lawns';
const VERSION_KEY = 'lawns_version';
const DATA_VERSION = 3; // v3 adds Alex/Lenox history + Egermont Ave
const DEFAULT_CYCLE = 8;

const seedLawns = [
  { id: 'eamons',     name: 'Eamons',                  address: '',              price: 55,  lastMow: '2026-06-23', cycle: 8,
    mowHistory: ['2026-05-10','2026-05-23','2026-06-06','2026-06-23'] },
  { id: 'bill',       name: 'Bill Cullen',              address: 'New York Ave',  price: 50,  lastMow: '2026-06-15', cycle: 8,
    mowHistory: ['2026-05-15','2026-05-27','2026-06-15'] },
  { id: 'vicki',      name: 'Vicki Smith',              address: '1218 West St.', price: 100, lastMow: '2026-06-13', cycle: 8,
    mowHistory: ['2026-05-17','2026-05-27','2026-06-13'] },
  { id: 'alex',       name: 'Alex',                     address: '10 Cardinal',   price: 60,  lastMow: '2026-06-19', cycle: 8,
    mowHistory: ['2026-05-26','2026-06-01','2026-06-12','2026-06-19'] },
  { id: 'lenox',      name: 'Lenox - Finna',            address: '39 East St.',   price: 70,  lastMow: '2026-06-24', cycle: 8,
    mowHistory: ['2026-05-10','2026-05-19','2026-05-27','2026-06-06','2026-06-16','2026-06-24'] },
  { id: 'egermont',   name: '17 Egermont Ave',          address: '',              price: 0,   lastMow: '2026-06-06', cycle: 8,
    mowHistory: ['2026-06-06'] },
  { id: 'crane',      name: 'Crane Ave Louie',          address: '',              price: 80,  lastMow: '2026-06-17', cycle: 8,
    mowHistory: ['2026-05-08','2026-05-16','2026-05-23','2026-05-31','2026-06-08','2026-06-17'] },
  { id: 'kitteredge', name: 'Kitteredge Norm',          address: '',              price: 50,  lastMow: '2026-06-24', cycle: 8,
    mowHistory: ['2026-05-08','2026-05-16','2026-05-23','2026-05-31','2026-06-08','2026-06-16','2026-06-24'] },
  { id: 'samuel',     name: "Norm's Neighbor / Samuel", address: '',              price: 60,  lastMow: '2026-06-24', cycle: 8,
    mowHistory: ['2026-05-23','2026-05-31','2026-06-08','2026-06-16','2026-06-24'] },
  { id: 'rick',       name: 'Rick',                     address: '',              price: 60,  lastMow: '2026-06-24', cycle: 8,
    mowHistory: ['2026-05-31','2026-06-08','2026-06-16','2026-06-24'] },
  { id: 'kearney',    name: '32 Kearney Drive',         address: '',              price: 70,  lastMow: '2026-06-11', cycle: 8,
    mowHistory: ['2026-05-05','2026-05-15','2026-05-23','2026-06-01','2026-06-09','2026-06-11'] },
  { id: 'nancy',      name: 'Nancy',                    address: '3 Grove St.',   price: 0,   lastMow: '2026-06-16', cycle: 8,
    mowHistory: ['2026-06-16'] },
];

let lawns = [];
let currentFilter = 'all';
const historyOpen = new Set();

function todayStr() { return new Date().toISOString().slice(0,10); }

function daysBetween(dateStr) {
  const today = new Date(todayStr() + 'T00:00:00');
  const then  = new Date(dateStr + 'T00:00:00');
  return Math.round((today - then) / 86400000);
}

function formatDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateFull(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function nextDueDate(lawn) {
  const d = new Date(lawn.lastMow + 'T00:00:00');
  d.setDate(d.getDate() + lawn.cycle);
  return d.toISOString().slice(0,10);
}

function migrateLawn(lawn) {
  if (!lawn.mowHistory) lawn.mowHistory = [lawn.lastMow];
  if (!lawn.mowHistory.includes(lawn.lastMow)) lawn.mowHistory.push(lawn.lastMow);
  lawn.mowHistory.sort();
  return lawn;
}

function mergeHistoryFromSeed(lawn) {
  const seed = seedLawns.find(s => s.id === lawn.id);
  if (!seed) return lawn;
  (seed.mowHistory || []).forEach(date => {
    if (!lawn.mowHistory.includes(date)) lawn.mowHistory.push(date);
  });
  lawn.mowHistory.sort();
  if (seed.lastMow > lawn.lastMow) lawn.lastMow = seed.lastMow;
  return lawn;
}

function loadLawns() {
  let loaded = null;
  let loadedVersion = 0;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) loaded = JSON.parse(raw);
    loadedVersion = parseInt(localStorage.getItem(VERSION_KEY) || '0', 10);
  } catch(e) {}

  if (!loaded) {
    lawns = seedLawns.map(migrateLawn);
  } else {
    lawns = loaded.map(migrateLawn);
    if (loadedVersion < DATA_VERSION) {
      lawns = lawns.map(mergeHistoryFromSeed);
      // Add any new lawns from seed not yet in saved data
      seedLawns.forEach(seed => {
        if (!lawns.find(l => l.id === seed.id)) {
          lawns.push(migrateLawn(Object.assign({}, seed)));
        }
      });
      try { localStorage.setItem(VERSION_KEY, String(DATA_VERSION)); } catch(e) {}
    }
  }

  // Legacy safety check for nancy
  if (!lawns.find(l => l.id === 'nancy')) {
    lawns.push(migrateLawn({ id: 'nancy', name: 'Nancy', address: '3 Grove St.', price: 0, lastMow: todayStr(), cycle: 8 }));
  }

  saveLawns(false);
  render();
}

function saveLawns(notify) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lawns));
    if (notify !== false) showSaveSuccess();
  } catch(e) { showSaveError(); }
}

let flashActive = false;

function showSaveError() {
  flashActive = true;
  const s = document.getElementById('subtitle');
  s.textContent = 'Save failed.'; s.style.color = 'var(--red)';
  setTimeout(() => { flashActive = false; }, 2000);
}

function showSaveSuccess() {
  flashActive = true;
  const s = document.getElementById('subtitle');
  s.textContent = 'Saved'; s.style.color = 'var(--green)';
  setTimeout(() => { flashActive = false; render(); }, 900);
}

function markMowed(id) {
  const lawn = lawns.find(l => l.id === id);
  if (!lawn) return;
  const today = todayStr();
  lawn.lastMow = today;
  if (!lawn.mowHistory.includes(today)) { lawn.mowHistory.push(today); lawn.mowHistory.sort(); }
  saveLawns(true); render();
}

function deleteLawn(id) {
  lawns = lawns.filter(l => l.id !== id);
  historyOpen.delete(id);
  saveLawns(true); render();
}

function updateCycle(id, value) {
  const lawn = lawns.find(l => l.id === id);
  if (!lawn) return;
  const n = parseInt(String(value).trim(), 10);
  if (!isNaN(n) && n >= 1) lawn.cycle = n; else if (String(value).trim() === '') lawn.cycle = DEFAULT_CYCLE;
  saveLawns(true);
}

function getStatus(lawn) {
  const due = nextDueDate(lawn);
  const d = daysBetween(due) * -1;
  if (d < 0) return { cls: 'due', label: 'OVERDUE by ' + Math.abs(d) + ' day' + (Math.abs(d)===1?'':'s'), due };
  if (d === 0) return { cls: 'due', label: 'DUE TODAY', due };
  if (d <= 2)  return { cls: 'soon', label: 'Due in ' + d + ' day' + (d===1?'':'s'), due };
  return { cls: 'ok', label: 'Due in ' + d + ' days', due };
}

function render() {
  const list = document.getElementById('list');
  const subtitle = document.getElementById('subtitle');
  const sorted = [...lawns].sort((a,b) => nextDueDate(a).localeCompare(nextDueDate(b)));
  const dueCount = sorted.filter(l => getStatus(l).cls === 'due').length;
  if (!flashActive) { subtitle.textContent = lawns.length + ' lawns · ' + dueCount + ' need mowing now · ' + todayStr(); subtitle.style.color = ''; }
  let filtered = sorted;
  if (currentFilter === 'due')  filtered = sorted.filter(l => getStatus(l).cls === 'due');
  if (currentFilter === 'soon') filtered = sorted.filter(l => getStatus(l).cls === 'soon');
  if (filtered.length === 0) { list.innerHTML = '<div class="empty">Nothing here. All caught up.</div>'; return; }
  list.innerHTML = '';
  filtered.forEach(lawn => {
    const status = getStatus(lawn);
    const card = document.createElement('div');
    card.className = 'card' + (status.cls === 'due' ? ' due' : status.cls === 'soon' ? ' soon' : '');
    const histCount = lawn.mowHistory.length;
    const showHist = historyOpen.has(lawn.id);
    let histHTML = '';
    if (showHist) {
      const rows = [...lawn.mowHistory].reverse().map(d => {
        const ago = daysBetween(d);
        const agoStr = ago === 0 ? 'today' : ago === 1 ? 'yesterday' : ago + ' days ago';
        return '<div class="history-entry"><span class="h-date">' + formatDateFull(d) + '</span><span class="h-ago">' + agoStr + '</span></div>';
      }).join('');
      histHTML = '<div class="history-section"><div style="font-size:0.75rem;color:var(--text-dim);letter-spacing:0.05em;text-transform:uppercase;">Mow History</div><div class="history-list">' + rows + '</div></div>';
    }
    card.innerHTML =
      '<div class="card-top"><div class="name">' + lawn.name + (lawn.address ? ' — ' + lawn.address : '') + '</div><div class="price">$' + lawn.price + '</div></div>' +
      '<div class="meta">Last mowed ' + formatDate(lawn.lastMow) + ' · Next: ' + formatDate(status.due) + ' · every <input type="number" class="cycle-input" min="1" value="' + lawn.cycle + '" data-id="' + lawn.id + '"> days</div>' +
      '<div class="status ' + status.cls + '">' + status.label + '</div>' +
      '<div class="controls">' +
        '<button data-action="mow" data-id="' + lawn.id + '">Mowed today</button>' +
        '<button class="btn-history secondary" data-action="history" data-id="' + lawn.id + '">' + (showHist ? 'Hide history' : 'History') + '<span class="history-badge">' + histCount + '</span></button>' +
        '<button class="secondary" data-action="delete" data-id="' + lawn.id + '" data-name="' + lawn.name + '">Remove</button>' +
      '</div>' + histHTML;
    list.appendChild(card);
  });
  list.querySelectorAll('[data-action="mow"]').forEach(b => b.addEventListener('click', () => markMowed(b.dataset.id)));
  list.querySelectorAll('[data-action="history"]').forEach(b => b.addEventListener('click', () => {
    if (historyOpen.has(b.dataset.id)) historyOpen.delete(b.dataset.id); else historyOpen.add(b.dataset.id);
    render();
  }));
  list.querySelectorAll('[data-action="delete"]').forEach(b => b.addEventListener('click', () => {
    if (confirm('Remove ' + b.dataset.name + '?')) deleteLawn(b.dataset.id);
  }));
  list.querySelectorAll('.cycle-input').forEach(i => {
    i.addEventListener('blur', () => { updateCycle(i.dataset.id, i.value); render(); });
    i.addEventListener('keydown', e => { if (e.key === 'Enter') i.blur(); });
  });
}

['filter-all','filter-due','filter-soon'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    currentFilter = id.replace('filter-','');
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    render();
  });
});

document.getElementById('add-lawn-btn').addEventListener('click', () => {
  const form = document.getElementById('add-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
  document.getElementById('new-lastmow').value = todayStr();
});
document.getElementById('cancel-new-lawn').addEventListener('click', () => {
  document.getElementById('add-form').style.display = 'none';
  ['new-name','new-price'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('new-cycle').value = '8';
});
document.getElementById('save-new-lawn').addEventListener('click', () => {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { alert('Please enter a name or address.'); return; }
  const price = parseFloat(document.getElementById('new-price').value) || 0;
  const cycle = parseInt(document.getElementById('new-cycle').value, 10) || DEFAULT_CYCLE;
  const lastMow = document.getElementById('new-lastmow').value || todayStr();
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now();
  lawns.push(migrateLawn({ id, name, address: '', price, lastMow, cycle }));
  saveLawns(true);
  document.getElementById('add-form').style.display = 'none';
  ['new-name','new-price'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('new-cycle').value = '8';
  render();
});

loadLawns();
</script>
</body>
</html>
